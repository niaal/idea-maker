<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Idea Maker — AI Hackathon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111;
    --paper: #f4efe6;
    --rule: #11111122;
    --accent: #d94a1f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 32px clamp(20px, 4vw, 64px);
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 11px;
  }
  header .lockup { font-weight: 500; }
  header .meta { opacity: 0.55; }

  main {
    flex: 1;
    display: grid;
    grid-template-rows: 1fr auto;
    padding: clamp(24px, 6vh, 80px) 0 24px;
    gap: 40px;
  }

  .stage {
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 0;
  }
  .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    opacity: 0.55;
    margin-bottom: 24px;
  }
  .idea {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 360;
    font-style: normal;
    font-variation-settings: "opsz" 144, "SOFT" 30;
    font-size: clamp(34px, 6.5vw, 84px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    max-width: 22ch;
    transition: opacity 220ms ease;
  }
  .idea .pivot {
    font-style: italic;
    color: var(--accent);
    font-variation-settings: "opsz" 144, "SOFT" 100;
  }
  .idea.is-loading { opacity: 0.15; }

  .actions {
    margin-top: 32px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .ghost {
    appearance: none;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink);
    font: inherit;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    padding: 10px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 120ms ease;
  }
  .ghost:hover { border-color: var(--ink); background: var(--ink); color: var(--paper); }
  .copy-status {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    opacity: 0;
    transition: opacity 160ms ease;
  }
  .copy-status.is-visible { opacity: 0.7; }

  .footnote {
    margin-top: 28px;
    font-size: 12px;
    opacity: 0.55;
    max-width: 60ch;
  }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 24px;
    align-items: end;
    border-top: 1px solid var(--rule);
    padding-top: 24px;
  }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    opacity: 0.55;
  }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    appearance: none;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink);
    font: inherit;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 120ms ease;
  }
  .chip:hover { border-color: var(--ink); }
  .chip[aria-pressed="true"] {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .generate {
    appearance: none;
    background: var(--ink);
    color: var(--paper);
    font: inherit;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    padding: 16px 28px;
    border: none;
    cursor: pointer;
    transition: transform 80ms ease;
  }
  .generate:hover { background: var(--accent); }
  .generate:active { transform: translateY(1px); }

  footer {
    border-top: 1px solid var(--rule);
    padding-top: 14px;
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.55;
  }

  @media (max-width: 720px) {
    .controls { grid-template-columns: 1fr; }
    .generate { width: 100%; }
  }
</style>
</head>
<body>
  <header>
    <div class="lockup">Idea Makertron</div>
    <div class="meta">AI Hackathon · 3 hours · 1 idea</div>
  </header>

  <main>
    <section class="stage">
      <div class="label">Build something that —</div>
      <h1 class="idea" id="idea">Press generate.</h1>
      <div class="actions">
        <button class="ghost" id="copy" type="button">Copy for Slack</button>
        <span class="copy-status" id="copyStatus" aria-live="polite"></span>
      </div>
      <p class="footnote" id="footnote">Two knobs. One idea. Re-roll until something makes you laugh, then build it.</p>
    </section>

    <section class="controls">
      <div class="field">
        <div class="field-label">Who's building</div>
        <div class="chip-row" id="role-row" role="radiogroup" aria-label="Role">
          <button class="chip" data-role="any" aria-pressed="true">Any</button>
          <button class="chip" data-role="designer" aria-pressed="false">Designer</button>
          <button class="chip" data-role="developer" aria-pressed="false">Developer</button>
          <button class="chip" data-role="pm" aria-pressed="false">PM</button>
          <button class="chip" data-role="leader" aria-pressed="false">Senior</button>
          <button class="chip" data-role="mixed" aria-pressed="false">Mixed team</button>
        </div>
      </div>

      <div class="field">
        <div class="field-label">Vibe</div>
        <div class="chip-row" id="vibe-row" role="radiogroup" aria-label="Vibe">
          <button class="chip" data-vibe="any" aria-pressed="true">Any</button>
          <button class="chip" data-vibe="useful" aria-pressed="false">Actually useful</button>
          <button class="chip" data-vibe="playful" aria-pressed="false">Playful</button>
          <button class="chip" data-vibe="weird" aria-pressed="false">Weird</button>
          <button class="chip" data-vibe="ambitious" aria-pressed="false">Ambitious</button>
        </div>
      </div>

      <button class="generate" id="generate">Generate ↻</button>
    </section>
  </main>

  <footer>
    <span>Made for the studio</span>
    <span id="seed">—</span>
  </footer>

function _decodePayload() {
  const bin = atob(_B);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const keyBytes = new TextEncoder().encode(_K);
  const out = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) out[i] = bytes[i] ^ keyBytes[i % keyBytes.length];
  return JSON.parse(new TextDecoder().decode(out));
}

const { POOLS, ROLE_TAILS } = _decodePayload();

// ---------- state ----------
const state = { role: "any", vibe: "any", current: null };
const ideaEl = document.getElementById("idea");
const seedEl = document.getElementById("seed");
const copyBtn = document.getElementById("copy");
const copyStatusEl = document.getElementById("copyStatus");

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generate() {
  const vibeKey = state.vibe === "any"
    ? pick(Object.keys(POOLS))
    : state.vibe;
  const [verb, pivot, tail] = pick(POOLS[vibeKey]);
  const roleTail = pick(ROLE_TAILS[state.role] || [""]);

  state.current = { verb, pivot, tail, roleTail, vibe: vibeKey, role: state.role };

  ideaEl.classList.add("is-loading");
  setTimeout(() => {
    ideaEl.innerHTML =
      escapeHtml(verb) + " " +
      '<span class="pivot">' + escapeHtml(pivot) + '</span> ' +
      escapeHtml(tail) +
      (roleTail ? ' <span style="opacity:0.55">' + escapeHtml(roleTail) + '</span>' : '');
    ideaEl.classList.remove("is-loading");
    seedEl.textContent = vibeKey + " · " + state.role + " · " + Math.random().toString(36).slice(2, 6);
    setCopyStatus("");
  }, 120);
}

function formatForSlack(idea) {
  if (!idea) return "";
  const sentence = `Build something that ${idea.verb} _${idea.pivot}_ ${idea.tail}`.replace(/\s+/g, " ").trim();
  const tail = idea.roleTail ? ` ${idea.roleTail}` : "";
  const tag = `_${idea.vibe} · ${idea.role}_`;
  return `:sparkles: *Idea Maker rolled:*\n> ${sentence}${tail}\n${tag}`;
}

async function copyIdea() {
  if (!state.current) return;
  const text = formatForSlack(state.current);
  try {
    await navigator.clipboard.writeText(text);
    setCopyStatus("Copied — paste into Slack");
  } catch {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); setCopyStatus("Copied — paste into Slack"); }
    catch { setCopyStatus("Couldn't copy — select and copy manually"); }
    document.body.removeChild(ta);
  }
}

let copyStatusTimer;
function setCopyStatus(msg) {
  clearTimeout(copyStatusTimer);
  copyStatusEl.textContent = msg;
  copyStatusEl.classList.toggle("is-visible", Boolean(msg));
  if (msg) copyStatusTimer = setTimeout(() => setCopyStatus(""), 2400);
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function wireRow(rowId, key) {
  const row = document.getElementById(rowId);
  row.addEventListener("click", e => {
    const btn = e.target.closest(".chip");
    if (!btn) return;
    row.querySelectorAll(".chip").forEach(c => c.setAttribute("aria-pressed", "false"));
    btn.setAttribute("aria-pressed", "true");
    state[key] = btn.dataset[key];
    generate();
  });
}

wireRow("role-row", "role");
wireRow("vibe-row", "vibe");
document.getElementById("generate").addEventListener("click", generate);
copyBtn.addEventListener("click", copyIdea);
document.addEventListener("keydown", e => {
  const isModC = (e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "c";
  if (isModC && window.getSelection && String(window.getSelection()) === "") {
    e.preventDefault();
    copyIdea();
    return;
  }
  if (e.key === " " || e.key === "Enter") {
    if (document.activeElement.tagName === "BUTTON") return;
    e.preventDefault();
    generate();
  }
});

generate();
</script>
